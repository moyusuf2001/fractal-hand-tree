<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hand Tree — Simple (keyboard only)</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0c1014; overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; }
    canvas { display: block; }
    #note {
      position: fixed;
      top: 14px;
      left: 14px;
      color: rgba(255, 255, 255, 0.75);
      font-size: 12px;
      line-height: 1.55;
      max-width: 300px;
      padding: 14px 16px;
      background: rgba(12, 16, 20, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      z-index: 10;
    }
    #note a { color: #9dd4c8; }
  </style>
</head>
<body>
  <div id="note">
    <strong>Fallback version</strong> — no webcam or ml5. Press <strong>1–5</strong> for tree complexity.
    <br><br>
    <a href="index.html">← Full HandPose version</a>
  </div>
  <script src="sketch-simple.js"></script>
</body>
</html>
